- name: Django Application server set up
  hosts: aws
  tasks:
    - name: Update packages
      become: true
      tags: [installation]
      ansible.builtin.apt:
        upgrade: yes
        update_cache: yes


    - name: Install Nginx and python
      become: true
      tags: [installation, app,nginx]
      ansible.builtin.apt:
        name:
          - nginx
          - python3-dev
          - python3-venv

    - name: Getting code base
      tags: [installation, app]
      ansible.builtin.git:
        accept_hostkey: true
        clone: yes
        update: yes
        name: git@github.com:gumisofts/bita_platform_backend.git
        dest: app
        force: yes
    - name: Setup Environment for Django App
      tags: [installation, app]
      ansible.builtin.shell:
        chdir: ~/app
        cmd: python3 -m venv env
    - name: Install Pip requirements
      tags: [installation, app]
      ansible.builtin.pip:
        virtualenv: ~/app/env
        requirements: ~/app/requirements.txt

    - name: Setup unix socket
      become: true
      tags: [installation, app]
      ansible.builtin.copy:
        force: true
        src: ../app.socket
        dest: /etc/systemd/system/app.socket
    - name: Setup Service
      become: true
      tags: [installation, app]
      ansible.builtin.copy:
        force: true
        src: ../app.service
        dest: /etc/systemd/system/app.service
    - name: Copy Environmental Variables
      tags: [installation, app]
      copy:
        dest: ~/app/
        force: true
        src: ../.env

    - name: Enable app socket
      become: true
      tags: [restart, app]
      ansible.builtin.systemd_service:
        name: app.socket
        enabled: true
        state: started
        daemon_reload: true

    - name: Enable app Service
      become: true
      tags: [restart, app]
      ansible.builtin.systemd_service:
        name: app
        state: started
        enabled: true
        daemon_reload: true


    - name: Upload ssl certificate
      become: true
      tags: [installation,nginx]
      ansible.builtin.copy:
        force: true
        src: ../api.bita.gumisofts.com.crt
        dest: /etc/ssl/certs/api.bita.gumisofts.com.crt
    - name: Upload ssl certificate private key
      become: true
      tags: [installation,nginx]
      ansible.builtin.copy:
        force: true
        src: ../api.bita.gumisofts.com.pem
        dest: /etc/ssl/certs/api.bita.gumisofts.com.pem

    - name: Upload nginx conf
      become: true
      tags: [installation,nginx]
      ansible.builtin.copy:
        force: true
        src: ../nginx.conf
        dest: /etc/nginx/conf.d/app.conf

    - name: Test nginx configuration
      become: true
      tags: [restart,nginx]
      ansible.builtin.command:
        cmd: nginx -t
      register: nginx_test
      failed_when: false

    - name: Display nginx test output if failed
      tags: [restart,nginx]
      debug:
        var: nginx_test.stderr_lines
      when: nginx_test.rc != 0

    - name: Enable Nginx Services on Boot
      become: true
      tags: [restart,nginx]
      ansible.builtin.systemd_service:
        name: nginx
        enabled: true
        state: restarted
      when: nginx_test.rc == 0
    - name: Enable app socket
      become: true
      tags: [restart]
      ansible.builtin.systemd_service:
        name: app.socket
        enabled: true
        state: started
        daemon_reload: true

    - name: Enable app Service
      become: true
      tags: [restart]
      ansible.builtin.systemd_service:
        name: app
        enabled: true
        state: restarted
        daemon_reload: true
