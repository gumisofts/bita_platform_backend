<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="x-apple-disable-message-reformatting" />
    <title>{{ subject }}</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        width: 100% !important;
        background-color: #f4f6f8;
        font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: #2d3340;
        -webkit-font-smoothing: antialiased;
      }
      table {
        border-collapse: collapse;
      }
      a {
        color: #1f6feb;
      }
      .wrapper {
        width: 100%;
        background-color: #f4f6f8;
        padding: 32px 12px;
      }
      .container {
        width: 100%;
        max-width: 560px;
        margin: 0 auto;
        background: #ffffff;
        border: 1px solid #e7eaee;
        border-radius: 10px;
        overflow: hidden;
      }
      .header {
        padding: 22px 32px;
        border-bottom: 1px solid #eef0f3;
      }
      .header .brand {
        margin: 0;
        font-size: 17px;
        font-weight: 700;
        letter-spacing: 0.2px;
        color: #1f6feb;
      }
      .content {
        padding: 32px;
      }
      .content .title {
        margin: 0 0 18px;
        font-size: 18px;
        font-weight: 600;
        color: #1a1f29;
      }
      .content .body-text {
        margin: 0;
        font-size: 15px;
        line-height: 1.65;
        color: #3a4150;
        word-break: break-word;
      }
      .footer {
        padding: 20px 32px;
        border-top: 1px solid #eef0f3;
        background-color: #fafbfc;
      }
      .footer p {
        margin: 0 0 6px;
        font-size: 12px;
        line-height: 1.5;
        color: #8a909c;
      }
      .footer a {
        color: #8a909c;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <table role="presentation" class="wrapper" width="100%" cellpadding="0" cellspacing="0">
      <tr>
        <td align="center">
          <table role="presentation" class="container" cellpadding="0" cellspacing="0">
            <!-- Header -->
            <tr>
              <td class="header" align="left">
                <p class="brand">Bita Business</p>
              </td>
            </tr>

            <!-- Content -->
            <tr>
              <td class="content" align="left">
                <h1 class="title">{{ subject }}</h1>
                <p class="body-text">{{ message|urlize|linebreaksbr }}</p>
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td class="footer" align="left">
                <p>
                  Need help? <a href="mailto:support@bita.et">support@bita.et</a>
                </p>
                <p>&copy; {% now "Y" %} Bita Business. All rights reserved.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
